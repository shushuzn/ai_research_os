site_name: AI Research OS
site_description: A Structured Research Operating System for Serious AI Researchers
site_url: https://shushuzn.github.io/ai_research_os/
site_author: shushuzn

repo_name: shushuzn/ai_research_os
repo_url: https://github.com/shushuzn/ai_research_os
copyright: Copyright &copy; 2026 shushuzn

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - content.code.copy

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shushuzn

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Specifications:
      - Phase 1 — Infrastructure: specs/phase1-spec.md
      - Phase 2 — Search & Import: specs/phase2-spec.md
      - Phase 3 — Citation Graph: specs/phase3-citation-graph-spec.md
  - Changelog: https://github.com/shushuzn/ai_research_os/blob/main/CHANGELOG.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
