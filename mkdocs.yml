site_name: AI Research OS
site_description: A Structured Research Operating System for Serious AI Researchers
site_url: https://shushuzn.github.io/ai_research_os/
repo_name: shushuzn/ai_research_os
repo_url: https://github.com/shushuzn/ai_research_os

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Changelog: https://github.com/shushuzn/ai_research_os/blob/main/CHANGELOG.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
