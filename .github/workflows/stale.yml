name: Stale PR Monitor

on:
  schedule:
    - cron: '0 9 * * MON'  # Every Monday 9am UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Mark PRs stale after 30 days of inactivity
          days-before-stale: 30

          # Only mark, never close
          days-before-close: -1

          # Labels
          stale-label: 'stale'
          remove-stale-when-updated: true

          # Comment message
          stale-comment: |
            This PR has been inactive for 30 days. 

            If you plan to continue work on this, please respond or remove the `stale` label.
            Otherwise it will be archived for reference.

          # Only target PRs, not issues
          only-labels: ''
          any-of-labels: ''
          start-date: ''

          # Limit operations per run
          operations-per-run: 100
