name: CI

on:
  push:
    branches: [main, fix-ci-runner, fix-ci-v2, final-ci-fix]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli@19 @commitlint/config-conventional@19

      - name: Validate current commit (last) commit message
        run: |
          npx commitlint --last --verbose || npx commitlint --only --last 2>/dev/null || echo "No previous commit to check"

      - name: Check commits since main
        run: |
          npx commitlint --from=main --verbose 2>&1 | head -50 || true

  lint-and-crossref:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyflakes requests

      - name: Syntax check
        run: python -m py_compile ai_research_os.py

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Pyflakes
        run: python -m pyflakes ai_research_os.py

      - name: Test Crossref API
        run: python -c "import requests; r=requests.get('https://api.crossref.org/works/10.1038/nature12373',timeout=15,headers={'User-Agent':'AI-Research-OS/1.0'}); r.raise_for_status(); print('Crossref OK:', r.json()['message']['title'][0][:50])"

  test-pytest:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest pytest-cov requests feedparser pymupdf freezegun

      - name: Run pytest with coverage
        run: python -m pytest tests/ -q --tb=short --cov=. --cov-report=term-missing 2>&1 | tee pytest_output_${{ matrix.python-version }}.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: pytest_output_${{ matrix.python-version }}.txt
          retention-days: 1

      - name: Upload coverage data
        if: always()
        run: |
          # Rename .coverage to non-hidden before upload so v4 handles path correctly
          cp .coverage .coverage.${{ matrix.python-version }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: .coverage.${{ matrix.python-version }}
          retention-days: 3

  coverage-report:
    needs: [test-pytest]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Download coverage artifacts from test-pytest jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          for pv in 3.9 3.10 3.11 3.12; do
            echo "=== Python $pv ==="
            # Find the test-pytest job for this Python version
            job_id=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/jobs" | \
              python -c "import sys,json; jobs=[j for j in json.load(sys.stdin)['jobs'] if j['name']==f'test-pytest ($pv)']; print(jobs[0]['id'] if jobs else '')")

            if [ -z "$job_id" ]; then
              echo "[ERROR] No test-pytest job found for Python $pv"
              continue
            fi

            # Get artifact info
            artifact_info=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/jobs/$job_id/artifacts")

            archive_url=$(echo "$artifact_info" | python -c "import sys,json; arts=json.load(sys.stdin)['artifacts']; print(next((a['archive_url'] for a in arts if a['name']=='coverage-data'),'')")

            if [ -z "$archive_url" ]; then
              echo "[ERROR] No coverage-data artifact found for Python $pv"
              continue
            fi

            # Download artifact zip with Authorization header (follows redirects)
            mkdir -p "cc-$pv"
            curl -s -L -H "Authorization: Bearer $GH_TOKEN" \
              "$archive_url" -o "cc-$pv/coverage.zip"

            # Extract .coverage.* from zip
            python -c "
import zipfile, os, sys
pv='$pv'
with zipfile.ZipFile(f'cc-{pv}/coverage.zip', 'r') as zf:
    for name in zf.namelist():
        if name.endswith(f'.coverage.{pv}'):
            zf.extract(name, f'cc-{pv}')
            os.rename(f'cc-{pv}/{name}', f'cc-{pv}/.coverage.{pv}')
            print(f'Extracted .coverage.$pv ({os.path.getsize(f\"cc-{pv}/.coverage.$pv\")} bytes)')
            break
    else:
        print('[ERROR] .coverage.$pv not found in zip')
        print('Files:', zf.namelist())
"

            rm -f "cc-$pv/coverage.zip"
            echo "Done: cc-$pv/.coverage.$pv"
          done

      - name: Combine coverage
        run: python -m coverage combine cc-3.9 cc-3.10 cc-3.11 cc-3.12

      - name: Coverage report
        run: python -m coverage report --format=term-missing

      - name: Coverage summary
        run: |
          python -m coverage report --format=term-missing | tail -3
          echo ""
          echo "Branch coverage:"
          python -m coverage report --format=term-missing | grep "^TOTAL"
