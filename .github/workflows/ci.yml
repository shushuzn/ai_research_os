name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes ruff 2>/dev/null || pip install pyflakes

      - name: Syntax check
        run: python -m py_compile ai_research_os.py

      - name: Pyflakes
        run: python -m pyflakes ai_research_os.py || true

  test-arxiv-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser pymupdf

      - name: Test arXiv ID normalization
        run: |
          python -c "
import sys, re
sys.path.insert(0, '.')
# Inline minimal test of normalize_arxiv_id
def normalize_arxiv_id(s):
    s = s.strip()
    m = re.search(r'(?:arxiv\.org/(?:abs|pdf)/)(\d{4}\.\d{4,5})(v\d+)?', s, flags=re.I)
    if m: return (m.group(1) + (m.group(2) or '')).strip()
    if re.fullmatch(r'\d{4}\.\d{4,5}(v\d+)?', s): return s
    return None

tests = [
    ('https://arxiv.org/abs/2601.00155', '2601.00155'),
    ('2601.00155', '2601.00155'),
    ('2601.00155v2', '2601.00155v2'),
    ('https://arxiv.org/pdf/2601.00155.pdf', '2601.00155'),
    ('10.48550/arXiv.2601.00155', '2601.00155'),
]
ok = True
for inp, exp in tests:
    out = normalize_arxiv_id(inp)
    if out != exp:
        print(f'FAIL: normalize_arxiv_id({inp!r}) -> {out!r}, expected {exp!r}')
        ok = False
if ok:
    print('All normalize_arxiv_id tests passed')
else:
    sys.exit(1)
"

      - name: Test arXiv API reachable
        run: python -c "
import requests, feedparser
r = requests.get('https://export.arxiv.org/api/query?id_list=2601.00155', timeout=15)
r.raise_for_status()
feed = feedparser.parse(r.text)
entry = feed.entries[0]
print(f'arXiv API OK: {entry.title[:50]}...')
"

  test-crossref-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser pymupdf

      - name: Test Crossref API reachable
        run: python -c "
import requests
r = requests.get('https://api.crossref.org/works/10.1038/nature12373', timeout=15, headers={'User-Agent': 'AI-Research-OS/1.0'})
r.raise_for_status()
d = r.json()
title = d['message']['title'][0]
print(f'Crossref API OK: {title[:50]}...')
"

  test-pdf-extraction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser pymupdf

      - name: Test PyMuPDF import
        run: python -c "import fitz; print(f'PyMuPDF OK: {fitz.__version__}')"

      - name: Test download and extract arXiv PDF
        run: |
          python -c "
import requests, fitz, io, sys
url = 'https://arxiv.org/pdf/2601.00155'
r = requests.get(url, timeout=60, allow_redirects=True)
r.raise_for_status()
doc = fitz.open(stream=r.content, filetype='pdf')
text = doc[0].get_text()
print(f'PDF extract OK: {len(text)} chars from page 1')
if len(text) < 50:
    print('WARNING: extracted text suspiciously short')
    sys.exit(1)
"
