name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install -g @commitlint/cli@19 @commitlint/config-conventional@19

      - name: Validate commit messages
        run: |
          npx commitlint --last --verbose 2>&1 || echo "No previous commit"
          npx commitlint --from=main --verbose 2>&1 | head -50

  lint-and-crossref:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyflakes requests

      - name: Syntax check
        run: python -m py_compile ai_research_os.py

      - name: Install and run ruff
        run: pip install ruff && ruff check .

      - name: Pyflakes
        run: python -m pyflakes ai_research_os.py

      - name: Test Crossref API
        run: python -c "import requests; r=requests.get('https://api.crossref.org/works/10.1038/nature12373',timeout=15,headers={'User-Agent':'AI-Research-OS/1.0'}); r.raise_for_status(); print('Crossref OK')"

  test-pytest:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest pytest-cov pytest-asyncio pytest-xdist aiohttp requests feedparser pymupdf freezegun numpy psutil

      - name: Split tests
        id: split
        run: |
          pip install pytest-split
          echo "total=$(( $(python -m pytest tests/ --collect-only -q 2>/dev/null | grep -c '::' || echo 0) ))" >> $GITHUB_OUTPUT
          echo "shard=${{ matrix.shard }}" >> $GITHUB_OUTPUT

      - name: Run pytest shard ${{ matrix.shard }}/4
        run: |
          python -m pytest tests/ \
            -q --tb=short \
            --cov=. --cov-report=term-missing \
            --splits 4 --group ${{ matrix.shard }} \
            2>&1 | tee pytest_output.txt
          echo "exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}-${{ matrix.shard }}
          path: pytest_output.txt
          retention-days: 1

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.python-version }}-${{ matrix.shard }}
          path: .coverage
          retention-days: 1

  coverage-report:
    needs: [test-pytest]
    runs-on: ubuntu-22.04
    if: github.run_id == github.event.run_id
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install coverage
        run: pip install coverage[toml]

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine and report
        run: |
          python -m coverage combine coverage-reports/
          python -m coverage report --format=term-missing | tail -3
          python -m coverage report --format=term-missing | grep "^TOTAL"
