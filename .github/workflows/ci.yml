name: CI

on:
  push:
    branches: [main, fix-ci-runner, fix-ci-v2, final-ci-fix]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli@19 @commitlint/config-conventional@19

      - name: Validate current commit (last) commit message
        run: |
          npx commitlint --last --verbose || npx commitlint --only --last 2>/dev/null || echo "No previous commit to check"

      - name: Check commits since main
        run: |
          npx commitlint --from=main --verbose 2>&1 | head -50 || true

  lint-and-crossref:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyflakes requests

      - name: Syntax check
        run: python -m py_compile ai_research_os.py

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Pyflakes
        run: python -m pyflakes ai_research_os.py

      - name: Test Crossref API
        run: python -c "import requests; r=requests.get('https://api.crossref.org/works/10.1038/nature12373',timeout=15,headers={'User-Agent':'AI-Research-OS/1.0'}); r.raise_for_status(); print('Crossref OK:', r.json()['message']['title'][0][:50])"

  test-pytest:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest pytest-cov requests feedparser pymupdf freezegun

      - name: Run pytest with coverage
        run: python -m pytest tests/ -q --tb=short --cov=. --cov-report=term-missing 2>&1 | tee pytest_output_${{ matrix.python-version }}.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: pytest_output_${{ matrix.python-version }}.txt
          retention-days: 1

      - name: Upload coverage data
        if: always()
        run: |
          # Rename .coverage to non-hidden before upload so v4 download-artifact handles path correctly
          cp .coverage .coverage.${{ matrix.python-version }}
          echo ".coverage.${{ matrix.python-version }}" > artifact_contains.txt

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.python-version }}
          path: .coverage.${{ matrix.python-version }}
          retention-days: 3

  coverage-report:
    needs: [test-pytest]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Download coverage data from test-pytest jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          import zipfile
          import io

          token = os.environ.get('GH_TOKEN', '')
          run_id = os.environ.get('RUN_ID', '')

          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28'
          }

          # Get all jobs for this run
          url = f'https://api.github.com/repos/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{run_id}/jobs'
          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          # Find test-pytest jobs and their artifacts
          python_versions = ['3.9', '3.10', '3.11', '3.12']
          for pv in python_versions:
              job = next((j for j in data['jobs'] if j['name'] == f'test-pytest ({pv})'), None)
              if not job:
                  print(f'[WARN] No test-pytest job found for Python {pv}')
                  continue

              # Get artifacts for this job
              artifacts_url = f'https://api.github.com/repos/{os.environ["GITHUB_REPOSITORY"]}/actions/jobs/{job["id"]}/artifacts'
              req2 = urllib.request.Request(artifacts_url, headers=headers)
              with urllib.request.urlopen(req2) as resp2:
                  art_data = json.loads(resp2.read())

              artifact = next((a for a in art_data.get('artifacts', []) if a['name'] == f'coverage-data-{pv}'), None)
              if not artifact:
                  print(f'[WARN] No coverage artifact found for Python {pv}')
                  continue

              # Download artifact zip
              print(f'Downloading coverage-data-{pv} from job {job["name"]}...')
              zip_url = artifact['archive_url']
              req3 = urllib.request.Request(zip_url, headers=headers)
              with urllib.request.urlopen(req3) as resp3:
                  zip_data = resp3.read()

              # Extract to cc-{version}/.coverage.{version}
              out_dir = f'cc-{pv}'
              os.makedirs(out_dir, exist_ok=True)
              with zipfile.ZipFile(io.BytesIO(zip_data)) as zf:
                  for name in zf.namelist():
                      if name.endswith('.coverage.') + pv or name == '.coverage.' + pv:
                          out_name = f'.coverage.{pv}'
                      else:
                          out_name = os.path.basename(name)
                      zf.extract(name, out_dir)
                      if out_name != name:
                          os.rename(os.path.join(out_dir, name), os.path.join(out_dir, out_name))
                          print(f'  Extracted and renamed to {out_name}')

              # Verify
              final_path = os.path.join(out_dir, f'.coverage.{pv}')
              if os.path.exists(final_path):
                  size = os.path.getsize(final_path)
                  print(f'  OK: {final_path} ({size} bytes)')
              else:
                  print(f'  FAIL: {final_path} not found! Contents: {os.listdir(out_dir)}')

          print('Done downloading artifacts.')
          PYEOF

      - name: Rename coverage files
        run: |
          for v in 3.9 3.10 3.11 3.12; do
            if [ -f "cc-$v/.coverage.$v" ]; then
              mv "cc-$v/.coverage.$v" "cc-$v/.coverage"
              echo "cc-$v: $(ls -la cc-$v/)"
            else
              echo "cc-$v: FILE NOT FOUND!"
              ls "cc-$v/" 2>/dev/null || echo "(dir missing)"
            fi
          done

      - name: Combine coverage
        run: python -m coverage combine cc-3.9 cc-3.10 cc-3.11 cc-3.12

      - name: Coverage report
        run: python -m coverage report --format=term-missing

      - name: Coverage summary
        run: |
          python -m coverage report --format=term-missing | tail -3
          echo ""
          echo "Branch coverage:"
          python -m coverage report --format=term-missing | grep "^TOTAL"
