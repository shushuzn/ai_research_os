name: CI

on:
  push:
    branches: [main, fix-ci-runner, fix-ci-v2, final-ci-fix]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli@19 @commitlint/config-conventional@19

      - name: Validate current commit (last) commit message
        run: |
          npx commitlint --last --verbose || npx commitlint --only --last 2>/dev/null || echo "No previous commit to check"

      - name: Check commits since main
        run: |
          npx commitlint --from=main --verbose 2>&1 | head -50 || true

  
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyflakes 2>/dev/null || pip install pyflakes

      - name: Syntax check
        run: python -m py_compile ai_research_os.py

      - name: Pyflakes
        run: python -m pyflakes ai_research_os.py || true

  test-arxiv:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Test arXiv API
        run: python -c "import requests, feedparser; r=requests.get('https://export.arxiv.org/api/query?id_list=2601.00155',timeout=15); r.raise_for_status(); feed=feedparser.parse(r.text); print('arXiv OK:', feed.entries[0].title[:50])"

  test-crossref:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Test Crossref API
        run: python -c "import requests; r=requests.get('https://api.crossref.org/works/10.1038/nature12373',timeout=15,headers={'User-Agent':'AI-Research-OS/1.0'}); r.raise_for_status(); print('Crossref OK:', r.json()['message']['title'][0][:50])"

  test-pytest:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest requests feedparser pymupdf

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short 2>&1 | tee pytest_output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest_output.txt
          retention-days: 1
