name: CI

on:
  push:
    branches: [main, fix-ci-runner, fix-ci-v2, final-ci-fix]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli@19 @commitlint/config-conventional@19

      - name: Validate current commit (last) commit message
        run: |
          npx commitlint --last --verbose || npx commitlint --only --last 2>/dev/null || echo "No previous commit to check"

      - name: Check commits since main
        run: |
          npx commitlint --from=main --verbose 2>&1 | head -50 || true

  lint-and-crossref:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyflakes requests

      - name: Syntax check
        run: python -m py_compile ai_research_os.py

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Pyflakes
        run: python -m pyflakes ai_research_os.py

      - name: Test Crossref API
        run: python -c "import requests; r=requests.get('https://api.crossref.org/works/10.1038/nature12373',timeout=15,headers={'User-Agent':'AI-Research-OS/1.0'}); r.raise_for_status(); print('Crossref OK:', r.json()['message']['title'][0][:50])"

  test-pytest:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest pytest-cov pytest-asyncio requests feedparser pymupdf freezegun numpy

      - name: Run pytest
        run: |
          python -m pytest tests/ -q --tb=short 2>&1 | tee pytest_output_${{ matrix.python-version }}.txt; exit ${PIPESTATUS[0]}

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: pytest_output_${{ matrix.python-version }}.txt
          retention-days: 1

  coverage-report:
    needs: [test-pytest]
    runs-on: ubuntu-22.04
    if: github.run_id == github.event.run_id
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install coverage
        run: pip install coverage[toml]

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine and report
        run: |
          python -m coverage combine coverage-reports/ || true
          python -m coverage report --format=term-missing || true
          python -m coverage report --format=term-missing | tail -3 || true
          python -m coverage report --format=term-missing | grep "^TOTAL" || true
