name: CI

on:
  push:
    branches: [main, fix-ci-runner, fix-ci-v2, final-ci-fix]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  commitlint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli@19 @commitlint/config-conventional@19

      - name: Validate current commit (last) commit message
        run: |
          npx commitlint --last --verbose || npx commitlint --only --last 2>/dev/null || echo "No previous commit to check"

      - name: Check commits since main
        run: |
          npx commitlint --from=main --verbose 2>&1 | head -50 || true

  lint-and-crossref:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyflakes requests

      - name: Syntax check
        run: python -m py_compile ai_research_os.py

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Pyflakes
        run: python -m pyflakes ai_research_os.py

      - name: Test Crossref API
        run: python -c "import requests; r=requests.get('https://api.crossref.org/works/10.1038/nature12373',timeout=15,headers={'User-Agent':'AI-Research-OS/1.0'}); r.raise_for_status(); print('Crossref OK:', r.json()['message']['title'][0][:50])"

  test-pytest:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install pytest pytest-cov requests feedparser pymupdf freezegun

      - name: Run pytest with coverage
        run: python -m pytest tests/ -q --tb=short --cov=. --cov-report=term-missing 2>&1 | tee pytest_output_${{ matrix.python-version }}.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: pytest_output_${{ matrix.python-version }}.txt
          retention-days: 1

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: .coverage
          retention-days: 3
          include-hidden-files: true

  coverage-report:
    needs: [test-pytest]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Download and combine coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          pip install coverage[toml]
          python -m coverage erase
          python - << 'PYEOF'
          import os, urllib.request, json, zipfile, shutil, subprocess
          token = os.environ["GITHUB_TOKEN"]
          run_id = os.environ["RUN_ID"]
          repo = os.environ["REPO"]
          headers = {"Authorization": f"token {token}"}
          # Get artifact list
          url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts"
          req = urllib.request.Request(url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              artifacts = json.load(resp)["artifacts"]
          for ver in ["3.9", "3.10", "3.11", "3.12"]:
              matching = [a for a in artifacts if a["name"] == f"coverage-report-{ver}"]
              if not matching:
                  print(f"No artifact for {ver}")
                  continue
              aid = matching[0]["id"]
              zip_url = f"https://api.github.com/repos/{repo}/actions/artifacts/{aid}/zip"
              req = urllib.request.Request(zip_url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = resp.read()
              with open(f"coverage-{ver}.zip", "wb") as f:
                  f.write(data)
              with zipfile.ZipFile(f"coverage-{ver}.zip", "r") as z:
                  z.extractall(f"cc-{ver}")
              os.remove(f"coverage-{ver}.zip")
              print(f"Downloaded coverage-{ver}")
          PYEOF
          python -m coverage combine cc-3.9 cc-3.10 cc-3.11 cc-3.12

      - name: Coverage report
        run: python -m coverage report --format=term-missing

      - name: Coverage summary
        run: |
          python -m coverage report --format=term-missing | tail -3
          echo ""
          echo "Branch coverage:"
          python -m coverage report --format=term-missing | grep "^TOTAL"
